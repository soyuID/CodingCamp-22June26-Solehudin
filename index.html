<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Error Banner -->
    <div id="error-banner" class="hidden" role="alert" aria-live="assertive"></div>

    <main class="app-container">
      <h1>Expense &amp; Budget Visualizer</h1>

      <!-- Balance Display -->
      <section class="balance-section" aria-labelledby="balance-label">
        <h2 id="balance-label">Total Balance</h2>
        <p id="balance">Rp 0</p>
      </section>

      <!-- Chart Section -->
      <section class="chart-section" aria-labelledby="chart-label">
        <h2 id="chart-label">Spending by Category</h2>
        <div class="chart-wrapper">
          <canvas id="spending-chart" aria-label="Spending pie chart" role="img"></canvas>
          <div id="chart-no-data" aria-live="polite">No data</div>
        </div>
      </section>

      <!-- Transaction Form -->
      <section class="form-section" aria-labelledby="form-label">
        <h2 id="form-label">Add Transaction</h2>
        <form id="transaction-form" novalidate>
          <div class="form-group">
            <label for="tx-name">Item Name</label>
            <input
              type="text"
              id="tx-name"
              name="name"
              maxlength="100"
              placeholder="e.g. Lunch"
              autocomplete="off"
            />
            <span class="field-error" id="error-name" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="tx-amount">Amount</label>
            <input
              type="number"
              id="tx-amount"
              name="amount"
              min="0.01"
              max="999999999.99"
              step="0.01"
              placeholder="e.g. 45000"
            />
            <span class="field-error" id="error-amount" aria-live="polite"></span>
          </div>

          <div class="form-group">
            <label for="tx-category">Category</label>
            <select id="tx-category" name="category">
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
            </select>
          </div>

          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section class="list-section" aria-labelledby="list-label">
        <h2 id="list-label">Transactions</h2>
        <ul id="transaction-list" aria-label="Transaction list">
          <li class="empty-state">No transactions yet.</li>
        </ul>
      </section>
    </main>

    <!-- Chart.js v4 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="js/app.js"></script>
  </body>
</html>
